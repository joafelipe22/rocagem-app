<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Roçagem e Poda</title>

<link rel="stylesheet" href="style.css">

<link rel="manifest" href="manifest.json">

</head>

<body>

<header>

<div class="logo">

<img src="logo.jpg" alt="Logo">

<h1>ROÇAGEM E PODA</h1>

<p>Orçamento rápido e gratuito</p>

</div>

</header>

<main>

<section class="formulario">

<h2>Solicite seu orçamento</h2>

<form id="orcamento">

<label>Nome</label>

<input
type="text"
id="nome"
placeholder="Digite seu nome"
required>

<label>Telefone</label>

<input
type="tel"
id="telefone"
placeholder="(21) 99999-9999"
required>

<label>Endereço</label>

<input
type="text"
id="endereco"
placeholder="Rua, número e bairro"
required>

<label>Descrição do serviço</label>

<textarea
id="descricao"
rows="5"
placeholder="Ex.: terreno com mato alto e pequena poda de árvores"></textarea>

<label>Fotos do local</label>

<input
type="file"
id="fotos"
accept="image/*"
multiple>

<div id="preview"></div>

<button
type="button"
onclick="enviarWhatsapp()">

Solicitar orçamento pelo WhatsApp

</button>

</form>

</section>

</main>

<script src="script.js"></script>

</body>

</html>
