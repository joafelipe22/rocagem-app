<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>App Roçagem e Poda</title>

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#eaf7ea;
}

header{
background:#2E7D32;
color:white;
text-align:center;
padding:20px;
font-size:28px;
font-weight:bold;
}

.container{
max-width:700px;
margin:25px auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,.2);
}

h2{
color:#2E7D32;
text-align:center;
}

input,textarea{
width:100%;
padding:12px;
margin-top:12px;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
box-sizing:border-box;
}

input[type=file]{
background:#f5f5f5;
}

button{
width:100%;
padding:15px;
margin-top:20px;
font-size:18px;
border:none;
border-radius:8px;
cursor:pointer;
}

.btn{
background:#25D366;
color:white;
}

.btn:hover{
background:#128C7E;
}

footer{
text-align:center;
padding:20px;
color:#555;
}

</style>

</head>

<body>

<header>

🌿 APP ROÇAGEM E PODA

</header>

<div class="container">

<h2>Solicite seu orçamento grátis</h2>

<input type="text" id="nome" placeholder="Nome">

<input type="tel" id="telefone" placeholder="Telefone">

<input type="text" id="endereco" placeholder="Endereço do serviço">

<textarea id="descricao" rows="5" placeholder="Descreva o serviço"></textarea>

<label><strong>Fotos do local</strong></label>

<input type="file" id="foto" multiple accept="image/*">

<button class="btn" onclick="enviarWhatsapp()">

📲 ENVIAR ORÇAMENTO PELO WHATSAPP

</button>

</div>

<footer>

© 2026 App Roçagem e Poda

</footer>

<script>

function enviarWhatsapp(){

let nome=document.getElementById("nome").value;

let telefone=document.getElementById("telefone").value;

let endereco=document.getElementById("endereco").value;

let descricao=document.getElementById("descricao").value;

let mensagem=`Olá!

Gostaria de solicitar um orçamento.

Nome: ${nome}

Telefone: ${telefone}

Endereço: ${endereco}

Descrição:
${descricao}

As fotos serão enviadas logo após esta mensagem.`;

window.open("https://wa.me/5521991960469?text="+encodeURIComponent(mensagem));

}

</script>

</body>
</html>
